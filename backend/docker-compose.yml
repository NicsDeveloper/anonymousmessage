services:
  db:
    image: postgres:15
    container_name: backend-postgres
    environment:
      POSTGRES_DB: nonfy
      POSTGRES_USER: nonfyuser
      POSTGRES_PASSWORD: nonfypass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nonfy-network

  api:
    build:
      context: .
      dockerfile: Nonfy.Api/Dockerfile
    container_name: nonfy-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    depends_on:
      - db
    networks:
      - nonfy-network

volumes:
  postgres_data:

networks:
  nonfy-network:
    driver: bridge